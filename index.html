<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>maaf anyaa</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #fff0f6, #ffd6e8, #ffc2dc);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    overflow: hidden;
}

/* ===== TEXT ===== */
.message {
    font-size: clamp(22px, 6vw, 34px);
    font-weight: 600;
    color: #444;
    max-width: 90%;
    line-height: 1.8;
    min-height: 200px;
    white-space: pre-line;
    padding: 20px;
}

.message span {
    opacity: 0;
    animation: appear 0.05s forwards;
}

@keyframes appear {
    to { opacity: 1; }
}

/* ===== BUTTON ===== */
.button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: #ff69b4;
    color: white;
    cursor: pointer;
    opacity: 0;
    transform: scale(0.8);
    transition: 0.4s;
}

.button.show {
    opacity: 1;
    transform: scale(1);
}

.button:hover {
    transform: scale(1.1);
}

/* ===== FLOWER ===== */
.flower {
    position: relative;
    width: 250px;
    height: 400px;
    margin-top: 40px;
    opacity: 0;
    transform: scale(0.8);
    transition: 1.5s ease;
}

.flower.show {
    opacity: 1;
    transform: scale(1);
    animation: sway 4s ease-in-out infinite;
}

@keyframes sway {
    0% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
    100% { transform: rotate(-2deg); }
}

/* ===== FALLING RINGS ===== */
.falling-ring {
    position: fixed;
    width: 25px;
    height: 25px;
    border: 4px solid white;
    border-radius: 50%;
    top: -40px;
    animation: fall linear forwards;
    pointer-events: none;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="message" id="typing"></div>

<button class="button" id="btn" onclick="clicked()">
mau pake lagi yaa?
</button>

<div class="flower" id="flower">
    <div class="petal" style="--r:0deg"></div>
    <div class="petal" style="--r:60deg"></div>
    <div class="petal" style="--r:120deg"></div>
    <div class="petal" style="--r:180deg"></div>
    <div class="petal" style="--r:240deg"></div>
    <div class="petal" style="--r:300deg"></div>

    <div class="center"></div>
    <div class="stem"></div>
    <div class="leaf left"></div>
    <div class="leaf right"></div>
</div>

<script>
let text = `anyaa baaikkkk dan paling cantikkkk 

maaf yaaa kemareen benerann lupaa buat pakee cincinnyaaa
maaf yaa udah buat anyaa kecewaa

plisss pake lagiii yaa cincinnya
janjii gak akaan akuu lepas lagiii

inii bungaa untuk anyaa`;

let container = document.getElementById("typing");
let flower = document.getElementById("flower");
let btn = document.getElementById("btn");

let i = 0;

function typeLetter() {
    if (i < text.length) {
        let span = document.createElement("span");
        span.textContent = text[i];
        container.appendChild(span);
        i++;
        setTimeout(typeLetter, 35);
    } else {
        flower.classList.add("show");
        btn.classList.add("show");
    }
}

function createRing() {
    let ring = document.createElement("div");
    ring.classList.add("falling-ring");

    // posisi random kiri-kanan
    ring.style.left = Math.random() * 100 + "vw";

    // durasi jatuh random
    ring.style.animationDuration = (2 + Math.random() * 2) + "s";

    document.body.appendChild(ring);

    setTimeout(() => {
        ring.remove();
    }, 4000);
}

function clicked() {
    btn.innerHTML = "YEEEAAAYY ANYAAAA MAUUUU";
    btn.style.background = "#ff1493";

    // hujan cincin
    let interval = setInterval(createRing, 200);

    // berhenti setelah 5 detik
    setTimeout(() => {
        clearInterval(interval);
    }, 5000);
}

typeLetter();
</script>

</body>
</html>
