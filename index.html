<!DOCTYPE html>
<html>
<head>
<title>maaf anyaa</title>
<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #fff0f6, #ffd6e8, #ffc2dc);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    overflow: hidden;
}

/* ===== TEXT ===== */
.message {
    font-size: 22px;
    font-weight: 600;
    color: #444;
    max-width: 750px;
    line-height: 1.8;
    min-height: 200px;
    white-space: pre-line; /* supaya enter kebaca */
}

.message span {
    opacity: 0;
    animation: appear 0.05s forwards;
}

@keyframes appear {
    to { opacity: 1; }
}

/* ===== FLOWER ===== */
.flower {
    position: relative;
    width: 250px;
    height: 400px;
    margin-top: 40px;
    opacity: 0;
    transform: scale(0.8);
    transition: 1.5s ease;
}

.flower.show {
    opacity: 1;
    transform: scale(1);
    animation: sway 4s ease-in-out infinite;
}

/* STEM */
.stem {
    position: absolute;
    width: 10px;
    height: 220px;
    background: linear-gradient(to bottom, #2e8b57, #006400);
    bottom: 0;
    left: 120px;
    border-radius: 10px;
}

/* LEAVES */
.leaf {
    position: absolute;
    width: 80px;
    height: 40px;
    background: linear-gradient(to right, #3cb371, #2e8b57);
    border-radius: 50px 0 50px 0;
}

.leaf.left {
    bottom: 120px;
    left: 50px;
    transform: rotate(-30deg);
}

.leaf.right {
    bottom: 80px;
    right: 50px;
    transform: rotate(30deg);
}

/* PETALS */
.petal {
    position: absolute;
    width: 100px;
    height: 170px;
    background: radial-gradient(circle at top, #ffffff, #f0f0f0);
    border-radius: 50% 50% 40% 40%;
    top: 20px;
    left: 75px;
    transform-origin: bottom center;
    transform: rotate(var(--r));
    box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

/* CENTER */
.center {
    position: absolute;
    width: 25px;
    height: 110px;
    background: linear-gradient(to bottom, #ffcc33, #cc9900);
    border-radius: 15px;
    top: 85px;
    left: 113px;
}

/* ===== FIREWORK ===== */
.firework {
    position: absolute;
    width: 6px;
    height: 6px;
    background: gold;
    border-radius: 50%;
    opacity: 0;
}

.firework.active {
    animation: explode 1.5s ease-out infinite;
}

.firework:nth-child(1){ top:40px; left:10%;}
.firework:nth-child(2){ top:70px; left:80%;}
.firework:nth-child(3){ top:20px; left:50%;}
.firework:nth-child(4){ bottom:250px; left:20%;}
.firework:nth-child(5){ bottom:220px; right:15%;}
.firework:nth-child(6){ top:100px; right:5%;}

@keyframes explode {
    0% { transform: scale(0); opacity:1; }
    50% { transform: scale(6); opacity:1; }
    100% { transform: scale(10); opacity:0; }
}

/* sway */
@keyframes sway {
    0% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
    100% { transform: rotate(-2deg); }
}
</style>
</head>
<body>

<div class="message" id="typing"></div>

<div class="flower" id="flower">
    <div class="petal" style="--r:0deg"></div>
    <div class="petal" style="--r:60deg"></div>
    <div class="petal" style="--r:120deg"></div>
    <div class="petal" style="--r:180deg"></div>
    <div class="petal" style="--r:240deg"></div>
    <div class="petal" style="--r:300deg"></div>

    <div class="center"></div>
    <div class="stem"></div>
    <div class="leaf left"></div>
    <div class="leaf right"></div>
</div>

<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>

<script>
let text = `anyaa baaikkkk dan paling cantikkkk 

maaf yaaa kemareen benerann lupaa buat dipakeenyaa
maaf yaa udah buat anyaa kecewaa

plisss pake lagiii yaa cincinnya
janjii gak akaan akuu lepas lagiii

inii bungaa untuk anyaa 🌸`;

let container = document.getElementById("typing");
let flower = document.getElementById("flower");
let fireworks = document.querySelectorAll(".firework");

let i = 0;

function typeLetter() {
    if (i < text.length) {
        let span = document.createElement("span");
        span.textContent = text[i];
        container.appendChild(span);
        i++;
        setTimeout(typeLetter, 35);
    } else {
        // setelah teks selesai
        flower.classList.add("show");
        fireworks.forEach(f => f.classList.add("active"));
    }
}

typeLetter();
</script>

</body>
</html>
